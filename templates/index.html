<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProScraper Pro v9.0 - Headless + Orquestracao + Supabase</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #252525;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --accent-primary: #00d4ff;
      --accent-secondary: #ff6b6b;
      --accent-success: #00ff88;
      --accent-warning: #ffaa00;
      --border: #2a2a2a;
      --shadow: rgba(0, 212, 255, 0.1);
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem;
    }
    
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .nav-menu {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    
    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.3s ease;
      font-weight: 500;
    }
    
    .nav-link:hover {
      background: var(--accent-primary);
      color: var(--bg-primary);
      border-color: var(--accent-primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--shadow);
    }
    
    .nav-link.active {
      background: var(--accent-primary);
      color: var(--bg-primary);
      border-color: var(--accent-primary);
    }
    
    .nav-link i {
      font-size: 1rem;
    }
    
    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    
    .subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
    }
    
    .version-badge {
      display: inline-block;
      background: var(--accent-success);
      color: var(--bg-primary);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 0.5rem;
    }
    
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    @media (max-width: 968px) {
      .main-grid { grid-template-columns: 1fr; }
      h1 { font-size: 2rem; }
    }
    
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }
    
    .section-title {
      font-size: 1.2rem;
      color: var(--accent-primary);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    label {
      display: block;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    
    input, select, textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px var(--shadow);
    }
    
    .url-input-group {
      position: relative;
    }
    
    .url-input-group input {
      padding-right: 50px;
    }
    
    .url-status {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
    }
    
    .btn {
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-primary), #0099cc);
      color: white;
      width: 100%;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
    }
    
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .operation-mode {
      display: none !important;
    }
    
    .operation-mode.active {
      display: block !important;
    }
    
    .toggle-switch {
      position: relative;
      width: 50px;
      height: 25px;
      background: var(--bg-tertiary);
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .toggle-switch.active {
      background: var(--accent-primary);
    }
    
    .toggle-slider {
      position: absolute;
      width: 21px;
      height: 21px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.3s ease;
    }
    
    .toggle-switch.active .toggle-slider {
      transform: translateX(25px);
    }
    
    .product-preview {
      background: var(--bg-tertiary);
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 1rem;
      display: none;
    }
    
    .product-info {
      display: flex;
      gap: 1.5rem;
      align-items: start;
      flex-wrap: wrap;
    }
    
    .product-image {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    
    .product-details {
      flex: 1;
      min-width: 200px;
    }
    
    .product-details h3 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }
    
    .price-info {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin: 0.5rem 0;
      flex-wrap: wrap;
    }
    
    .price-original {
      text-decoration: line-through;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    
    .price-current {
      color: var(--accent-success);
      font-size: 1.3rem;
      font-weight: 600;
    }
    
    .discount-badge {
      background: var(--accent-secondary);
      color: white;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    
    .status-bar {
      background: var(--bg-tertiary);
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1rem;
      display: none;
      align-items: center;
      gap: 1rem;
    }
    
    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-success);
      animation: blink 1s ease-in-out infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    .loader {
      display: none;
      width: 40px;
      height: 40px;
      border: 3px solid var(--bg-tertiary);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 2rem auto;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .message-container {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    
    .message-actions {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    
    .btn-small {
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .btn-copy {
      background: var(--bg-tertiary);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
    }
    
    .btn-copy:hover {
      background: var(--accent-primary);
      color: var(--bg-primary);
    }
    
    .btn-edit {
      background: var(--bg-tertiary);
      color: var(--accent-warning);
      border: 1px solid var(--accent-warning);
    }
    
    .btn-edit:hover {
      background: var(--accent-warning);
      color: var(--bg-primary);
    }
    
    .btn-save {
      background: var(--accent-success);
      color: var(--bg-primary);
    }
    
    .btn-save:hover {
      background: #00cc6a;
    }
    
    .message-text {
      font-family: 'Consolas', 'Monaco', monospace;
      white-space: pre-wrap;
      color: var(--text-primary);
      line-height: 1.8;
      width: 100%;
      min-height: 120px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      resize: vertical;
      transition: all 0.3s ease;
    }
    
    .message-text:focus {
      outline: none;
      border-color: var(--accent-warning);
      box-shadow: 0 0 0 3px rgba(255, 170, 0, 0.1);
    }
    
    .message-text[readonly] {
      cursor: default;
    }
    
    .message-text:not([readonly]) {
      cursor: text;
      background: #2a2a2a;
      border-color: var(--accent-warning);
    }
    
    .notification {
      position: fixed;
      top: 2rem;
      right: 2rem;
      padding: 1rem 2rem;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      transform: translateX(400px);
      transition: transform 0.3s ease;
      z-index: 1000;
    }
    
    .notification.show {
      transform: translateX(0);
    }
    
    .notification.success { background: var(--accent-success); }
    .notification.error { background: var(--accent-secondary); }
    .notification.info { background: var(--accent-primary); }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 2rem;
    }
    
    .stat-card {
      background: var(--bg-tertiary);
      padding: 1.5rem;
      border-radius: 8px;
      text-align: center;
      border: 1px solid var(--border);
    }
    
    .stat-value {
      font-size: 2rem;
      font-weight: 600;
      color: var(--accent-primary);
    }
    
    .stat-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
    }
    
    .success-message {
      background: var(--accent-success);
      color: var(--bg-primary);
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem 0;
      text-align: center;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>ProScraper Pro</h1>
      <p class="subtitle">Sistema Simplificado de Extração e Envios</p>
      <div class="version-badge">v10.0 - BANCO LOCAL + MENSAGEM PADRÃO✨</div>
      
      <!-- Navigation Menu -->
      <nav class="nav-menu">
        <a href="/" class="nav-link active">
          <i class="fas fa-home"></i>
          <span>Extração</span>
        </a>
        <a href="/sender" class="nav-link">
          <i class="fas fa-paper-plane"></i>
          <span>Envios</span>
        </a>
      </nav>
    </header>

    <div class="main-grid">
      <!-- PAINEL DE CONTROLE -->
      <div class="card">
        <h2 class="section-title">⚙️ Painel de Controle</h2>
        
          <small style="color: var(--text-secondary); margin-top: 0.5rem; display: block;">
            💡 Teste: Mude a opção acima para ver os campos aparecerem
          </small>
        </div>

        <!-- MODO AUTOMÁTICO -->
        <div id="modeAutomatico" class="operation-mode active">
          <div class="form-group">
            <label>URL do Produto</label>
            <div class="url-input-group">
              <input type="url" id="productUrl" placeholder="Cole a URL do produto">
              <span class="url-status" id="urlStatus"></span>
            </div>
          </div>
          <button class="btn btn-primary btn-icon" onclick="extractFromUrl()">
            <span>🚀</span> Extrair Dados
          </button>
        </div>

        
        
        <!-- CONFIGURAÇÕES -->
        <div id="configurations">
                    
          
          
          
                  </div>

        <div class="status-bar" id="statusBar">
          <div class="status-indicator"></div>
          <span id="statusText">Pronto</span>
        </div>
      </div>

      <!-- ÁREA DE RESULTADOS -->
      <div class="card">
        <h2 class="section-title">📊 Resultados</h2>
        
        <div class="product-preview" id="productPreview">
          <div class="product-info">
            <img class="product-image" id="productImage" src="" alt="Produto">
            <div class="product-details">
              <h3 id="productTitle">Produto</h3>
              <div class="price-info">
                <span class="price-original" id="priceOriginal"></span>
                <span class="price-current" id="priceCurrent"></span>
                <span class="discount-badge" id="discountBadge"></span>
              </div>
              <div id="productStore" style="margin-top: 0.5rem; color: var(--text-secondary);"></div>
            </div>
          </div>
        </div>

        <div class="loader" id="loader"></div>

        <div id="messagesContainer" style="display: none;">
          <h3 style="color: var(--accent-primary); margin: 2rem 0 1rem;">✉️ Mensagens Geradas</h3>
          <div id="messagesList"></div>
        </div>
      </div>
    </div>

    <!-- ESTATÍSTICAS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statSuccess">0</div>
        <div class="stat-label">Sucesso</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statSaved">0</div>
        <div class="stat-label">Salvos</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statTime">0s</div>
        <div class="stat-label">Tempo Médio</div>
      </div>
    </div>
  </div>

    <div class="notification" id="notification"></div>

  <script>
    // ESTADO GLOBAL
    let currentProduct = null;
    let stats = { total: 0, success: 0, saved: 0, totalTime: 0 };

    // UTILITÁRIOS
    function showNotification(message, type = 'info') {
      const notification = document.getElementById('notification');
      notification.className = `notification ${type}`;
      notification.textContent = message;
      notification.classList.add('show');
      setTimeout(() => notification.classList.remove('show'), 3000);
    }

    function updateStats() {
      document.getElementById('statTotal').textContent = stats.total;
      document.getElementById('statSuccess').textContent = stats.success;
      document.getElementById('statSaved').textContent = stats.saved;
      document.getElementById('statTime').textContent = stats.total > 0 
        ? `${(stats.totalTime / stats.total / 1000).toFixed(1)}s` : '0s';
    }

    function showLoader(show = true) {
      document.getElementById('loader').style.display = show ? 'block' : 'none';
    }

    function showStatus(text, show = true) {
      const statusBar = document.getElementById('statusBar');
      const statusText = document.getElementById('statusText');
      statusBar.style.display = show ? 'flex' : 'none';
      statusText.textContent = text;
    }

    function sanitizeForJson(text) {
      return text.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n');
    }

    // MODO AUTOMÁTICO
    async function extractFromUrl() {
      const url = document.getElementById('productUrl').value.trim();
      if (!url) {
        showNotification('Insira uma URL válida', 'error');
        return;
      }

      showLoader();
      showStatus('Extraindo dados...');
      const startTime = Date.now();
      stats.total++;

      try {
        const response = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await response.json();
        
        if (data.success) {
          currentProduct = data.data;
          stats.success++;
          stats.totalTime += Date.now() - startTime;
          
          displayProduct(currentProduct);
          generateMessages();
          showStatus('Extração concluída!');
          showNotification('Dados extraídos com sucesso!', 'success');
        } else {
          throw new Error(data.error);
        }
      } catch (error) {
        showStatus('Erro na extração');
        showNotification(`Erro: ${error.message}`, 'error');
      } finally {
        showLoader(false);
        updateStats();
      }
    }

    
    
    // EXIBIR PRODUTO
    function displayProduct(product) {
      const preview = document.getElementById('productPreview');
      preview.style.display = 'block';

      // Imagem
      const img = document.getElementById('productImage');
      if (product.fields.image_url?.value) {
        img.src = product.fields.image_url.value;
        img.onerror = () => img.src = 'https://via.placeholder.com/150?text=Sem+Imagem';
      } else {
        img.src = 'https://via.placeholder.com/150?text=Sem+Imagem';
      }

      // Título
      document.getElementById('productTitle').textContent = 
        product.fields.title?.value || 'Produto';

      // Preços
      const priceOriginal = document.getElementById('priceOriginal');
      const priceCurrent = document.getElementById('priceCurrent');
      const discountBadge = document.getElementById('discountBadge');

      if (product.fields.price_original?.value) {
        priceOriginal.textContent = product.fields.price_original.value;
        priceOriginal.style.display = 'inline';
      } else {
        priceOriginal.style.display = 'none';
      }

      priceCurrent.textContent = product.fields.price_current?.value || 'Preço não disponível';

      if (product.fields.discount_percentage?.value) {
        discountBadge.textContent = product.fields.discount_percentage.value;
        discountBadge.style.display = 'inline';
      } else {
        discountBadge.style.display = 'none';
      }

      // Loja
      document.getElementById('productStore').textContent = 
        `🏪 ${product.site_name || 'Manual'}`;
    }

    // GERAR MENSAGENS
    function generateMessages() {
      if (!currentProduct) return;

      const container = document.getElementById('messagesContainer');
      const messagesList = document.getElementById('messagesList');
      
      container.style.display = 'block';
      messagesList.innerHTML = '';

      // Criar mensagem padrão única
      const message = createStandardMessage(currentProduct);
      const messageDiv = createMessageElement(message, 0);
      messagesList.appendChild(messageDiv);
    }

    // CRIAR MENSAGEM PADRÃO
    function createStandardMessage(product) {
      const title = product.fields.title?.value || 'Produto';
      const price = product.fields.price_current?.value || 'Preço não disponível';
      const url = product.url;

      // Buscar configurações do banco local (se disponíveis)
      const sellerText = 'Vendido e entregue por Amazon'; // Padrão
      const groupLink = 'https://linktr.ee/Free_Island'; // Padrão

      const message = `➡️ ${title}
${sellerText}

✅ Por ${price}
🛒 ${url}

☑️ Link do grupo: ${groupLink}`;

      return {
        title: 'Mensagem Padrão',
        message: message,
        category: 'padrao',
        type: 'promocao'
      };
    }

    // CRIAR ELEMENTO DE MENSAGEM
    function createMessageElement(message, index) {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message-container';

      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'message-actions';

      // Botão Editar
      const btnEdit = document.createElement('button');
      btnEdit.className = 'btn-small btn-edit';
      btnEdit.innerHTML = '✏️ Editar';
      btnEdit.onclick = () => toggleEditMode(messageDiv, btnEdit);

      // Botão Copiar
      const btnCopy = document.createElement('button');
      btnCopy.className = 'btn-small btn-copy';
      btnCopy.innerHTML = '📋 Copiar';
      btnCopy.onclick = () => {
        const textarea = messageDiv.querySelector('.message-text');
        const textToCopy = textarea.value;
        navigator.clipboard.writeText(textToCopy);
        showNotification('Mensagem copiada!', 'success');
      };

      // Botão Salvar
      const btnSave = document.createElement('button');
      btnSave.className = 'btn-small btn-save';
      btnSave.innerHTML = '📋 Copiar';
      btnSave.onclick = () => {
        const textarea = messageDiv.querySelector('.message-text');
        const textToCopy = textarea.value;
        navigator.clipboard.writeText(textToCopy);
        showNotification('Mensagem copiada!', 'success');
      };

      actionsDiv.appendChild(btnEdit);
      actionsDiv.appendChild(btnCopy);
      actionsDiv.appendChild(btnSave);

      // Textarea
      const textarea = document.createElement('textarea');
      textarea.className = 'message-text';
      textarea.value = message.replace(/\\n/g, '\n');
      textarea.setAttribute('readonly', true);

      messageDiv.appendChild(actionsDiv);
      messageDiv.appendChild(textarea);

      return messageDiv;
    }

    // ALTERNAR MODO DE EDIÇÃO
    function toggleEditMode(messageDiv, btnEdit) {
      const textarea = messageDiv.querySelector('.message-text');
      const isEditing = !textarea.hasAttribute('readonly');
      
      if (isEditing) {
        // Sair do modo de edição
        textarea.setAttribute('readonly', true);
        textarea.style.borderColor = 'var(--border)';
        textarea.style.backgroundColor = 'var(--bg-tertiary)';
        btnEdit.innerHTML = '✏️ Editar';
        btnEdit.style.background = '';
        showNotification('Edição salva!', 'success');
      } else {
        // Entrar no modo de edição
        textarea.removeAttribute('readonly');
        textarea.style.borderColor = 'var(--accent-warning)';
        textarea.style.backgroundColor = '#2a2a2a';
        textarea.focus();
        btnEdit.innerHTML = '💾 Salvar';
        btnEdit.style.background = 'var(--accent-warning)';
        btnEdit.style.color = 'var(--bg-primary)';
        showNotification('Modo de edição ativado!', 'info');
      }
    }

    

    // DETECTAR SITE PELA URL
    document.getElementById('productUrl').addEventListener('input', function(e) {
      const url = e.target.value;
      const status = document.getElementById('urlStatus');
      
      if (!url) {
        status.textContent = '';
        return;
      }

      let icon = '❓';
      if (url.includes('mercadolivre.com')) icon = '🛒';
      else if (url.includes('amazon.com')) icon = '📦';
      else if (url.includes('magazineluiza.com')) icon = '🏪';
      else if (url.includes('shopee.com')) icon = '🛍️';
      
      status.textContent = icon;
    });

    
    // INICIALIZAÇÃO
    function initializeApp() {
      console.log('Inicializando aplicação...');
      
      // Verificar elementos essenciais
      const requiredElements = [
        'productUrl', 'productPreview', 'messagesContainer'
      ];
      
      requiredElements.forEach(id => {
        const element = document.getElementById(id);
        if (!element) {
          console.error(`Elemento ${id} não encontrado!`);
        }
      });
      
      updateStats();
      showStatus('Sistema carregado e pronto!');
    }

    // Aguardar DOM estar completamente carregado
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initializeApp);
    } else {
      initializeApp();
    }

    console.log('🚀 ProScraper Pro v10.0 - Sistema Simplificado Carregado!');
  </script>
</body>
</html>
