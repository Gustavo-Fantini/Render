<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Envios - ProScraper Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .card-shadow {
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    .status-online {
      background: linear-gradient(135deg, #10b981, #059669);
    }
    .status-offline {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- Header -->
  <header class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center">
          <h1 class="text-xl font-bold text-gray-900">ProScraper Pro</h1>
          <span class="ml-2 text-sm text-gray-500">Sistema de Envios</span>
        </div>
        <nav class="flex space-x-4">
          <a href="/" class="text-gray-600 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">
            <i class="fas fa-home mr-1"></i>Extração
          </a>
          <a href="/sender" class="bg-blue-600 text-white px-3 py-2 rounded-md text-sm font-medium">
            <i class="fas fa-paper-plane mr-1"></i>Envios
          </a>
        </nav>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
    <div class="px-4 py-6 sm:px-0">
      
      <!-- Status Card -->
      <div class="bg-white rounded-lg card-shadow p-6 mb-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">
          <i class="fas fa-heartbeat mr-2 text-green-600"></i>Status da Aplicação
        </h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="text-center">
            <div id="scheduler-status" class="w-16 h-16 mx-auto rounded-full flex items-center justify-center text-white font-bold mb-2">
              <i class="fas fa-clock"></i>
            </div>
            <p class="text-sm font-medium text-gray-900">Scheduler</p>
            <p id="scheduler-text" class="text-xs text-gray-500">Verificando...</p>
          </div>
          
          <div class="text-center">
            <div id="whatsapp-status" class="w-16 h-16 mx-auto rounded-full flex items-center justify-center text-white font-bold mb-2">
              <i class="fas fa-whatsapp"></i>
            </div>
            <p class="text-sm font-medium text-gray-900">WhatsApp</p>
            <p id="whatsapp-text" class="text-xs text-gray-500">Verificando...</p>
          </div>
          
          <div class="text-center">
            <div id="database-status" class="w-16 h-16 mx-auto rounded-full flex items-center justify-center text-white font-bold mb-2 status-online">
              <i class="fas fa-database"></i>
            </div>
            <p class="text-sm font-medium text-gray-900">Banco Local</p>
            <p class="text-xs text-gray-500">SQLite Online</p>
          </div>
        </div>
      </div>

      <!-- Configuration Card -->
      <div class="bg-white rounded-lg card-shadow p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">
          <i class="fas fa-clock mr-2 text-blue-600"></i>Controle do Agendamento
        </h2>
        
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Status do Agendamento</label>
            <div id="scheduler-status" class="px-3 py-2 border border-gray-300 rounded-lg bg-gray-50">
              <i class="fas fa-spinner fa-spin mr-2"></i>Carregando...
            </div>
          </div>
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Intervalo (minutos)</label>
            <div class="flex space-x-2">
              <input type="number" id="scheduler-interval" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" min="5" max="1440" value="15">
              <button onclick="updateInterval()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                <i class="fas fa-save mr-2"></i>Atualizar
              </button>
            </div>
            <p class="text-xs text-gray-500 mt-1">Mínimo: 5 minutos | Máximo: 1440 minutos (24 horas)</p>
          </div>
          
          <div class="flex space-x-3">
            <button onclick="startScheduler()" class="flex-1 bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">
              <i class="fas fa-play mr-2"></i>Iniciar
            </button>
            <button onclick="stopScheduler()" class="flex-1 bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition">
              <i class="fas fa-stop mr-2"></i>Parar
            </button>
          </div>
        </div>
        
        <div id="scheduler-result" class="mt-4 text-center text-sm"></div>
      </div>

    </div>
  </main>

  <script>
    // Global variables
    let currentStatus = {};

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      refreshStatus();
      loadSchedulerSettings();
      
      // Auto refresh every 30 seconds
      setInterval(refreshStatus, 30000);
    });

    // API Functions
    async function refreshStatus() {
      try {
        const response = await fetch('/api/sender/status');
        const data = await response.json();
        
        if (data.success) {
          updateStatusDisplay(data.status);
        }
      } catch (error) {
        console.error('Error refreshing status:', error);
      }
    }

    async function loadSchedulerSettings() {
      try {
        const response = await fetch('/api/scheduler/interval');
        const data = await response.json();
        
        if (data.success) {
          document.getElementById('scheduler-interval').value = data.interval;
        }
      } catch (error) {
        console.error('Error loading scheduler settings:', error);
      }
    }

    function updateStatusDisplay(status) {
      // Scheduler Status
      const schedulerEl = document.getElementById('scheduler-status');
      
      if (status.scheduler_running) {
        schedulerEl.innerHTML = '<i class="fas fa-play-circle mr-2 text-green-600"></i><span class="text-green-600 font-medium">Rodando</span>';
      } else {
        schedulerEl.innerHTML = '<i class="fas fa-stop-circle mr-2 text-red-600"></i><span class="text-red-600 font-medium">Parado</span>';
      }

      // WhatsApp Status
      const whatsappEl = document.getElementById('whatsapp-status');
      const whatsappText = document.getElementById('whatsapp-text');
      
      if (status.whatsapp_connected) {
        whatsappEl.className = 'w-16 h-16 mx-auto rounded-full flex items-center justify-center text-white font-bold mb-2 status-online';
        whatsappText.textContent = 'Conectado';
      } else {
        whatsappEl.className = 'w-16 h-16 mx-auto rounded-full flex items-center justify-center text-white font-bold mb-2 status-offline';
        whatsappText.textContent = 'Desconectado';
      }
    }

    // Scheduler Control Functions
    async function updateInterval() {
      const interval = parseInt(document.getElementById('scheduler-interval').value);
      
      if (interval < 5 || interval > 1440) {
        showResult('Intervalo deve estar entre 5 e 1440 minutos', 'error');
        return;
      }

      try {
        const response = await fetch('/api/scheduler/interval', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ interval: interval })
        });

        const data = await response.json();

        if (data.success) {
          showResult(`Intervalo atualizado para ${interval} minutos`, 'success');
        } else {
          showResult(`Erro: ${data.error}`, 'error');
        }
      } catch (error) {
        console.error('Error updating interval:', error);
        showResult('Erro ao atualizar intervalo', 'error');
      }
    }

    async function startScheduler() {
      try {
        const response = await fetch('/api/scheduler/start', {
          method: 'POST'
        });

        const data = await response.json();

        if (data.success) {
          showResult('Scheduler iniciado com sucesso', 'success');
          refreshStatus();
        } else {
          showResult(`Erro: ${data.error}`, 'error');
        }
      } catch (error) {
        console.error('Error starting scheduler:', error);
        showResult('Erro ao iniciar scheduler', 'error');
      }
    }

    async function stopScheduler() {
      try {
        const response = await fetch('/api/scheduler/stop', {
          method: 'POST'
        });

        const data = await response.json();

        if (data.success) {
          showResult('Scheduler parado com sucesso', 'success');
          refreshStatus();
        } else {
          showResult(`Erro: ${data.error}`, 'error');
        }
      } catch (error) {
        console.error('Error stopping scheduler:', error);
        showResult('Erro ao parar scheduler', 'error');
      }
    }

    function showResult(message, type) {
      const resultEl = document.getElementById('scheduler-result');
      resultEl.className = `mt-4 text-center text-sm p-3 rounded-lg ${
        type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'
      }`;
      resultEl.textContent = message;
      
      // Clear after 5 seconds
      setTimeout(() => {
        resultEl.textContent = '';
        resultEl.className = 'mt-4 text-center text-sm';
      }, 5000);
    }

    function all(values) {
      return values.every(v => v !== null && v !== undefined && v !== '');
    }
  </script>
</body>
</html>
